<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OWN Research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-surface: #f3f4f6;
        --text-main: #111827;
        --text-muted: #4b5563;
        --border-color: #e5e7eb;
      }
      .dark-theme {
        --bg-primary: #050505;
        --bg-surface: #121212;
        --text-main: #ffffff;
        --text-muted: #9ca3af;
        --border-color: #1f2937;
      }
      body {
        transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* Global smooth click effect */
      button:active {
        transform: scale(0.98);
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: 'var(--bg-primary)', 
              surface: 'var(--bg-surface)', 
              main: 'var(--text-main)',
              muted: 'var(--text-muted)',
              line: 'var(--border-color)',
              accent: '#ff3333', 
              'accent-dim': '#991f1f',
            },
            fontFamily: {
              serif: ['Playfair Display', 'Georgia', 'serif'],
              mono: ['Courier Prime', 'Courier New', 'monospace'],
              pixel: ['"VT323"', 'monospace'],
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in': 'fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'slide-up': 'slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'scale(0.99)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&family=Inter:wght@300;400;600&family=VT323&display=swap" rel="stylesheet">
    
    <!-- PDF Reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Mermaid for Mind Maps -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        mermaid.initialize({ 
          startOnLoad: false, 
          securityLevel: 'loose',
          theme: 'base',
          themeVariables: {
            darkMode: false,
            primaryColor: '#f3f4f6',
            lineColor: '#ff3333',
            textColor: '#111827',
            mainBkg: '#ffffff',
            nodeBorder: '#ff3333',
            clusterBkg: '#f3f4f6',
            fontFamily: '"Courier Prime", monospace'
          }
        });
      });
    </script>
    
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-primary text-main antialiased h-screen overflow-hidden selection:bg-accent selection:text-white">
    <div id="root" class="h-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
